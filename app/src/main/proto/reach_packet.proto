syntax = "proto3";

option java_package = "com.reach.project.core.serialization";
option java_multiple_files = true;

message ReachPacket {
    string service_name = 1;
    string sender_id = 2;
    oneof payload {
        Message message = 3;
        TypingIndicator typing_indicator = 4;
        Hello hello = 5;
        Heartbeat heartbeat = 6;
        Goodbye goodbye = 7;
        FileAccept file_accept = 9;
        FileComplete file_complete = 10;
        CallSignal call_signal = 11;
    }
}

message Message {
    string sender_username = 1;
    string message_id = 2;
    int64 timestamp = 4;
    string text = 5;
    FileHeader file_header = 6;
}

message TypingIndicator { }

message Hello {
    string sender_username = 1;
}

message Heartbeat {
    string sender_username = 1;
}

message Goodbye { }

message FileHeader {
    bytes file_hash = 1;
    string filename = 3;
    int64 file_size = 4;
    string mime_type = 5;
}

message FileAccept {
    bytes file_hash = 1;
    int32 port = 2;
    int64 offset = 3;
}

message FileComplete {
    bytes file_hash = 1;
}

message CallSignal {
    string call_id = 1;

    oneof payload {
        CallAccept call_accept = 2;
        CallCancel call_cancel = 3;
        CallDecline call_decline = 4;
        CallEnd call_end = 5;
        CallInit call_init = 6;
        SdpAnswer sdp_answer = 7;
        SdpOffer sdp_offer = 8;
        IceCandidate ice_candidate = 9;
    }
}

message CallInit {
    string sender_username = 2;
}

message CallAccept {}

message CallCancel {}

message CallDecline {}

message CallEnd {}

message SdpOffer {
    string description = 1;
}

message SdpAnswer {
    string description = 1;
}

message IceCandidate {
    string candidate = 1;
    string sdp_mid = 2;
    int32 m_line_index = 3;
}